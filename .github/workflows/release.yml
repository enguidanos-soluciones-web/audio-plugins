name: Release
run-name: Release ${{ github.ref_name }}

on:
  push:
    tags:
      - "*-v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── macOS universal (arm64 + x86_64) ────────────────────────────────────────
  build-macos-universal:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Pin clap submodule to tag 1.2.7
        run: git -C external/clap-1.2.7 checkout tags/1.2.7

      - name: Derive variables from tag
        run: |
          TAG="${{ github.ref_name }}"
          CRATE_NAME="${TAG%-v*}"
          PLUGIN_NAME="${CRATE_NAME//-/_}"
          BUNDLE_ID_SUFFIX=$(echo "$CRATE_NAME" | sed 's/-\([a-z]\)/\u\1/g; s/^\([a-z]\)/\u\1/')
          echo "CRATE_NAME=$CRATE_NAME"   >> $GITHUB_ENV
          echo "PLUGIN_NAME=$PLUGIN_NAME" >> $GITHUB_ENV
          echo "BUNDLE_ID=com.enguidanosweb.${BUNDLE_ID_SUFFIX}" >> $GITHUB_ENV

      - uses: dtolnay/rust-toolchain@nightly

      - name: Install Rust targets
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-universal-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Tailwind CSS
        run: |
          curl -sLo /usr/local/bin/tailwindcss \
            https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-macos-arm64
          chmod +x /usr/local/bin/tailwindcss

      - name: Build CSS
        working-directory: clap/${{ env.CRATE_NAME }}
        run: |
          if [ -f src/gui/app/style/index.css ]; then
            tailwindcss -i ./src/gui/app/style/index.css -o ./src/gui/app/style/output.css -m
          fi

      - name: Build arm64
        run: cargo build --release -p ${{ env.CRATE_NAME }} --target aarch64-apple-darwin

      - name: Build x86_64
        run: cargo build --release -p ${{ env.CRATE_NAME }} --target x86_64-apple-darwin

      - name: Create universal binary with lipo
        run: |
          lipo -create \
            target/aarch64-apple-darwin/release/lib${{ env.PLUGIN_NAME }}.dylib \
            target/x86_64-apple-darwin/release/lib${{ env.PLUGIN_NAME }}.dylib \
            -output lib${{ env.PLUGIN_NAME }}_universal.dylib

      - name: Bundle .clap
        run: |
          BUNDLE="${{ env.PLUGIN_NAME }}.clap"
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION##*-v}"
          mkdir -p "$BUNDLE/Contents/MacOS"
          cp lib${{ env.PLUGIN_NAME }}_universal.dylib "$BUNDLE/Contents/MacOS/${{ env.PLUGIN_NAME }}"
          cat > "$BUNDLE/Contents/Info.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>${{ env.PLUGIN_NAME }}</string>
              <key>CFBundleIdentifier</key>
              <string>${{ env.BUNDLE_ID }}</string>
              <key>CFBundleVersion</key>
              <string>${VERSION}</string>
              <key>CFBundlePackageType</key>
              <string>BNDL</string>
              <key>CFBundleSignature</key>
              <string>????</string>
          </dict>
          </plist>
          EOF
          codesign --force --deep --sign - "$BUNDLE"

      - name: Install clap-validator
        run: cargo install --git https://github.com/free-audio/clap-validator

      - name: Validate .clap
        run: clap-validator validate ${{ env.PLUGIN_NAME }}.clap

      - name: Zip
        run: zip -r "${{ github.ref_name }}-macos-universal.zip" "${{ env.PLUGIN_NAME }}.clap"

      - name: Build PKG installer
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION##*-v}"
          bash "clap/${{ env.CRATE_NAME }}/installer/macos.sh" \
            --bundle  "${{ env.PLUGIN_NAME }}.clap" \
            --id      "${{ env.BUNDLE_ID }}" \
            --version "$VERSION" \
            --out     "${{ github.ref_name }}-macos-universal.pkg"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          path: |
            ${{ github.ref_name }}-macos-universal.zip
            ${{ github.ref_name }}-macos-universal.pkg

  # ── Linux x86_64 ─────────────────────────────────────────────────────────────
  build-linux-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Pin clap submodule to tag 1.2.7
        run: git -C external/clap-1.2.7 checkout tags/1.2.7

      - name: Derive variables from tag
        run: |
          TAG="${{ github.ref_name }}"
          CRATE_NAME="${TAG%-v*}"
          PLUGIN_NAME="${CRATE_NAME//-/_}"
          echo "CRATE_NAME=$CRATE_NAME"   >> $GITHUB_ENV
          echo "PLUGIN_NAME=$PLUGIN_NAME" >> $GITHUB_ENV

      - uses: dtolnay/rust-toolchain@nightly

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libx11-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-x86_64-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Tailwind CSS
        run: |
          curl -sLo /usr/local/bin/tailwindcss \
            https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-linux-x64
          chmod +x /usr/local/bin/tailwindcss

      - name: Build CSS
        working-directory: clap/${{ env.CRATE_NAME }}
        run: |
          if [ -f src/gui/app/style/index.css ]; then
            tailwindcss -i ./src/gui/app/style/index.css -o ./src/gui/app/style/output.css -m
          fi

      - name: Build
        run: cargo build --release -p ${{ env.CRATE_NAME }}

      - name: Package .clap
        run: cp target/release/lib${{ env.PLUGIN_NAME }}.so ${{ env.PLUGIN_NAME }}.clap

      - name: Install clap-validator
        run: cargo install --git https://github.com/free-audio/clap-validator

      - name: Validate .clap
        run: clap-validator validate ${{ env.PLUGIN_NAME }}.clap

      - name: Zip
        run: zip "${{ github.ref_name }}-linux-x86_64.zip" "${{ env.PLUGIN_NAME }}.clap"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: ${{ github.ref_name }}-linux-x86_64.zip

  # ── Windows x86_64 ───────────────────────────────────────────────────────────
  build-windows-x86_64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Pin clap submodule to tag 1.2.7
        run: git -C external/clap-1.2.7 checkout tags/1.2.7

      - name: Derive variables from tag
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          CRATE_NAME="${TAG%-v*}"
          PLUGIN_NAME="${CRATE_NAME//-/_}"
          echo "CRATE_NAME=$CRATE_NAME"   >> $GITHUB_ENV
          echo "PLUGIN_NAME=$PLUGIN_NAME" >> $GITHUB_ENV

      - uses: dtolnay/rust-toolchain@nightly

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-x86_64-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Tailwind CSS
        shell: bash
        run: |
          curl -sLo tailwindcss.exe \
            https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-windows-x64.exe
          echo "$PWD" >> $GITHUB_PATH

      - name: Build CSS
        shell: bash
        working-directory: clap/${{ env.CRATE_NAME }}
        run: |
          if [ -f src/gui/app/style/index.css ]; then
            tailwindcss -i ./src/gui/app/style/index.css -o ./src/gui/app/style/output.css -m
          fi

      - name: Build
        run: cargo build --release -p ${{ env.CRATE_NAME }}

      - name: Package .clap
        shell: pwsh
        run: Copy-Item "target\release\${{ env.PLUGIN_NAME }}.dll" "${{ env.PLUGIN_NAME }}.clap"

      - name: Install clap-validator
        run: cargo install --git https://github.com/free-audio/clap-validator

      - name: Validate .clap
        run: clap-validator validate ${{ env.PLUGIN_NAME }}.clap

      - name: Zip
        shell: pwsh
        run: Compress-Archive -Path "${{ env.PLUGIN_NAME }}.clap" -DestinationPath "${{ github.ref_name }}-windows-x86_64.zip"

      - name: Build NSIS installer
        shell: pwsh
        run: |
          $version = ("${{ github.ref_name }}" -split '-v')[-1]
          $pluginFile = Join-Path $PWD "${{ env.PLUGIN_NAME }}.clap"
          $outFile    = Join-Path $PWD "${{ github.ref_name }}-windows-x86_64.exe"
          $script     = Join-Path $PWD "clap" "${{ env.CRATE_NAME }}" "installer" "windows.nsi"
          makensis /DPLUGIN_FILE="$pluginFile" /DDISPLAY_NAME="Take My Headphones" /DVERSION="$version" /DOUTFILE="$outFile" $script

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: |
            ${{ github.ref_name }}-windows-x86_64.zip
            ${{ github.ref_name }}-windows-x86_64.exe

  # ── GitHub Release ───────────────────────────────────────────────────────────
  release:
    needs: [build-macos-universal, build-linux-x86_64, build-windows-x86_64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Derive variables from tag
        run: |
          TAG="${{ github.ref_name }}"
          CRATE_NAME="${TAG%-v*}"
          echo "CRATE_NAME=$CRATE_NAME" >> $GITHUB_ENV

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ## Installation

            ### macOS (recommended)
            Download `*-macos-universal.pkg` and double-click to install.
            The installer places the plugin in `/Library/Audio/Plug-Ins/CLAP/` (requires admin password).

            > **Unsigned plugin:** macOS may block it. Right-click the `.pkg` → Open, or run:
            > ```bash
            > xattr -dr com.apple.quarantine /Library/Audio/Plug-Ins/CLAP/*.clap
            > ```

            ### Windows (recommended)
            Download `*-windows-x86_64.exe` and run the installer.
            Installs to `C:\Program Files\Common Files\CLAP\` (requires admin).

            > **Unsigned:** SmartScreen may warn. Click "More info → Run anyway".

            ### Manual install
            Download the `.zip` for your platform and place the `.clap` in your CLAP plugin folder:

            | Platform | Folder |
            |---|---|
            | macOS | `/Library/Audio/Plug-Ins/CLAP/` or `~/Library/Audio/Plug-Ins/CLAP/` |
            | Linux | `~/.clap/` |
            | Windows | `C:\Program Files\Common Files\CLAP\` |
          files: artifacts/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
